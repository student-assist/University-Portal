backend:
  name: github
  repo: student-assist/University-Portal
  branch: main
  base_url: https://university-auth.shakersaadan.workers.dev
  auth_endpoint: /auth

publish_mode: editorial_workflow
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "structure"
    label: "⚙️ إدارة الكليات والتخصصات"
    folder: "data/structure"
    create: true
    delete: true # يتيح لك حذف الكلية أو التخصص بالكامل
    slug: "{{college}}"
    fields:
      - { label: "اسم الكلية", name: "college", widget: "string" }
      - label: "الأقسام والتخصصات التابعة لها"
        name: "depts"
        widget: "list"
        fields:
          - { label: "اسم التخصص الدراسي", name: "dept_name", widget: "string" }

  - name: "subjects"
    label: "📚 إضافة وتعديل المواد الدراسية"
    folder: "data/subjects"
    create: true
    delete: true
    slug: "{{college}}-{{dept}}-{{level}}-{{term}}-{{title}}"
    fields:
      - { label: "اسم الكلية (اختر من الكليات المعتمدة)", name: "college", widget: "string" }
      - { label: "التخصص الدراسي / القسم", name: "dept", widget: "string" }
      - { label: "المستوى الدراسي", name: "level", widget: "select", options: ["مستوى أول", "مستوى ثاني", "مستوى ثالث", "مستوى رابع", "مستوى خامس"] }
      - { label: "الفصل الدراسي", name: "term", widget: "select", options: ["الفصل الأول", "الفصل الثاني"] }
      - { label: "اسم المادة", name: "title", widget: "string" }
      
      - label: "الملازم والسلايدات"
        name: "materials"
        widget: "list"
        required: false
        fields:
          - { label: "اسم الملزمة", name: "name", widget: "string" }
          - { label: "رابط الملف", name: "url", widget: "string" }
          - { label: "وصف مختصر", name: "desc", widget: "text", required: false }

      - label: "الكتب والمراجع"
        name: "references"
        widget: "list"
        required: false
        fields:
          - { label: "اسم الكتاب", name: "name", widget: "string" }
          - { label: "رابط الكتاب", name: "url", widget: "string" }
          - { label: "وصف مختصر", name: "desc", widget: "text", required: false }

      - label: "روابط الكورسات المهمة"
        name: "courses"
        widget: "list"
        required: false
        fields:
          - { label: "اسم الكورس", name: "name", widget: "string" }
          - { label: "رابط الكورس", name: "url", widget: "string" }
          - { label: "وصف الكورس", name: "desc", widget: "text", required: false }
