<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة مساعد الدراسات الجامعية - م/ شاكر سعدان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #1e293b; line-height: 1.6; }
        header { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; padding: 35px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-bottom: 4px solid #3b82f6; }
        header h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .developer-tag { display: inline-block; margin-top: 12px; background: rgba(59, 130, 246, 0.25); border: 1px solid rgba(255,255,255,0.2); padding: 5px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #93c5fd; }
        .container { max-width: 850px; margin: 25px auto; padding: 0 20px; }
        
        .navigation-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; gap: 15px; border: 1px solid #e2e8f0; }
        .breadcrumb { display: flex; gap: 8px; font-size: 14px; color: #64748b; flex-wrap: wrap; align-items: center; }
        .breadcrumb span { cursor: pointer; color: #1e3a8a; font-weight: 600; }
        .back-btn { background: #f1f5f9; color: #334155; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #cbd5e1; display: flex; align-items: center; gap: 6px; }

        .step-title { font-size: 16px; font-weight: 700; color: #1e3a8a; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; background: #eff6ff; padding: 12px 20px; border-radius: 12px; border-right: 5px solid #2563eb; }
        
        .list-group { display: flex; flex-direction: column; gap: 14px; }
        .nav-btn { background: white; padding: 20px 24px; border-radius: 12px; border-right: 6px solid #1e3a8a; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 15px; transition: all 0.2s ease; border: 1px solid #e2e8f0; border-right: none; }
        .nav-btn:hover { transform: translateY(-2px); background: #fafafa; border-right-color: #3b82f6; }
        .nav-btn .title-wrapper { display: flex; align-items: center; gap: 14px; }
        .nav-btn i.main-icon { color: #1e3a8a; font-size: 20px; }

        /* التبويبات الثلاثة الأنيقة تظهر فقط داخل صفحة المادة النظيفة */
        .tabs-header { display: flex; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; padding: 4px; gap: 4px; }
        .tab-link { flex: 1; text-align: center; padding: 14px; font-weight: 700; cursor: pointer; border-radius: 8px; color: #475569; transition: all 0.2s; }
        .tab-link.active { background: #1e3a8a; color: white; }
        .tab-content { display: none; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .tab-content.active { display: block; }
        
        /* كروت عرض الملفات للمادة المفتوحة */
        .file-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 10px; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 12px; }
        .file-card:hover { border-color: #3b82f6; background: #f0fdf4; }
        .file-card .file-info { display: flex; flex-direction: column; gap: 4px; }
        .file-card .file-name { font-weight: 700; font-size: 15px; color: #0f172a; }
        .file-card .file-desc { font-size: 12px; color: #64748b; }
        .download-btn { background: #10b981; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .download-btn:hover { background: #059669; }

        .no-data { text-align: center; color: #64748b; padding: 40px 20px; font-size: 14px; background: #f8fafc; border-radius: 12px; border: 2px dashed #cbd5e1; }
    </style>
</head>
<body>

    <header>
        <h1>بوابة مساعد الدراسات الجامعية</h1>
        <div class="developer-tag"><i class="fa-solid fa-code"></i> رئيس المشروع والمطور: م/ شاكر سعدان</div>
    </header>

    <div class="container">
        <div class="navigation-bar">
            <div class="breadcrumb" id="breadcrumb">
                <span onclick="goHome()"><i class="fa-solid fa-house"></i> الرئيسية</span>
            </div>
            <button class="back-btn" id="back-btn" onclick="goBack()" style="display: none;">
                <i class="fa-solid fa-arrow-left"></i> عودة للخلف
            </button>
        </div>

        <div class="step-title" id="step-title">الرجاء اختيار الكلية التابع لها للوصول للمواد:</div>
        <div id="dynamic-view"></div>
    </div>

    <script>
        let subjectsData = [];
        let currentPath = { college: null, dept: null, level: null, term: null, subject: null };

        // الهيكلية الثابتة والمثالية لجامعتك
        const academicStructure = {
            "كلية الهندسة": ["هندسة حواسب", "هندسة مدنية", "هندسة معمارية", "هندسة اتصالات"],
            "كلية الحاسبات": ["تقنية معلومات", "علوم حاسوب", "نظم معلومات"],
            "كلية الطب": ["طب بشري", "مختبرات", "صيدلة"],
            "كلية التجارة": ["محاسبة", "إدارة أعمال"]
        };

        const levels = ["مستوى أول", "مستوى ثاني", "مستوى ثالث", "مستوى رابع", "مستوى خامس"];
        const terms = ["الفصل الأول", "الفصل الثاني"];

        // جلب البيانات ومزامنتها ديناميكياً مع الـ CMS والمواد المضافة
        async function loadData() {
            try {
                const response = await fetch('https://api.github.com/repos/student-assist/University-Portal/contents/data/subjects');
                if (response.ok) {
                    const files = await response.json();
                    for (let file of files) {
                        if (file.name.endsWith('.json') || file.name.endsWith('.md')) {
                            const contentRes = await fetch(file.download_url);
                            if (contentRes.ok) {
                                const rawText = await contentRes.text();
                                const parsed = parseMarkdownFrontmatter(rawText);
                                if(parsed) subjectsData.push(parsed);
                            }
                        }
                    }
                }
                renderColleges();
            } catch (error) {
                renderColleges();
            }
        }

        function parseMarkdownFrontmatter(text) {
            try {
                const matches = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
                if (!matches) return null;
                const lines = matches[1].split('\n');
                const obj = { materials: [], references: [], courses: [] };
                
                let currentSection = null;
                let currentItem = null;

                lines.forEach(line => {
                    const cleanLine = line.trim();
                    if (!cleanLine) return;

                    if (cleanLine.startsWith('materials:')) { currentSection = 'materials'; return; }
                    if (cleanLine.startsWith('references:')) { currentSection = 'references'; return; }
                    if (cleanLine.startsWith('courses:')) { currentSection = 'courses'; return; }

                    if (currentSection && cleanLine.startsWith('-')) {
                        if (currentItem) obj[currentSection].push(currentItem);
                        currentItem = {};
                    }

                    const parts = cleanLine.replace(/^-/, '').split(':');
                    if (parts.length >= 2) {
                        const key = parts[0].trim();
                        const val = parts.slice(1).join(':').trim().replace(/^"|"$/g, '');
                        if (currentSection && currentItem) {
                            currentItem[key] = val;
                        } else if (!currentSection) {
                            obj[key] = val;
                        }
                    }
                });
                if (currentSection && currentItem) obj[currentSection].push(currentItem);
                return obj;
            } catch(e) { return null; }
        }

        function goHome() {
            currentPath = { college: null, dept: null, level: null, term: null, subject: null };
            renderColleges();
        }

        function goBack() {
            if (currentPath.subject) { currentPath.subject = null; renderSubjects(); }
            else if (currentPath.term) { currentPath.term = null; renderTerms(); }
            else if (currentPath.level) { currentPath.level = null; renderLevels(); }
            else if (currentPath.dept) { currentPath.dept = null; renderDepts(); }
            else if (currentPath.college) { currentPath.college = null; renderColleges(); }
        }

        function renderColleges() {
            updateUI("الرجاء اختيار الكلية التابع لها للوصول للمواد:", false);
            let html = '<div class="list-group">';
            Object.keys(academicStructure).forEach(c => {
                html += `<div class="nav-btn" onclick="selectCollege('${c}')"><div class="title-wrapper"><i class="fa-solid fa-university main-icon"></i> <span>${c}</span></div><i class="fa-solid fa-chevron-left"></i></div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectCollege(college) { currentPath.college = college; renderDepts(); }

        function renderDepts() {
            updateUI(`الأقسام والتخصصات المتاحة في (${currentPath.college}):`, true);
            let depts = academicStructure[currentPath.college] || [];
            let html = '<div class="list-group">';
            depts.forEach(d => {
                html += `<div class="nav-btn" onclick="selectDept('${d}')"><div class="title-wrapper"><i class="fa-solid fa-graduation-cap main-icon"></i> <span>${d}</span></div><i class="fa-solid fa-chevron-left"></i></div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectDept(dept) { currentPath.dept = dept; renderLevels(); }

        function renderLevels() {
            updateUI(`المستويات الدراسية لتخصص (${currentPath.dept}):`, true);
            let html = '<div class="list-group">';
            levels.forEach(l => {
                html += `<div class="nav-btn" onclick="selectLevel('${l}')"><div class="title-wrapper"><i class="fa-solid fa-layer-group main-icon"></i> <span>${l}</span></div><i class="fa-solid fa-chevron-left"></i></div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectLevel(level) { currentPath.level = level; renderTerms(); }

        function renderTerms() {
            updateUI(`اختر الفصل الدراسي للوصول للمواد:`, true);
            let html = '<div class="list-group">';
            terms.forEach(t => {
                html += `<div class="nav-btn" onclick="selectTerm('${t}')"><div class="title-wrapper"><i class="fa-solid fa-calendar-day main-icon"></i> <span>${t}</span></div><i class="fa-solid fa-chevron-left"></i></div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectTerm(term) { currentPath.term = term; renderSubjects(); }

        function renderSubjects() {
            updateUI(`المواد الدراسية المقررة:`, true);
            let activeSubjects = subjectsData.filter(item => 
                item.college === currentPath.college && 
                item.dept === currentPath.dept && 
                item.level === currentPath.level && 
                item.term === currentPath.term
            );

            if(activeSubjects.length === 0) {
                // تظل الواجهة نظيفة ومفتوحة لكي يعلم المتطوع أن هناك مادة تنظره ليرفعها
                // نستخدم أسماء مواد افتراضية نموذجية لتوجيه نظر المتطوعين والطلاب
                let defaultSubjects = ["برمجة حاسوب", "تراكيب بيانات", "رياضيات حاسوب"];
                let html = '<div class="list-group">';
                defaultSubjects.forEach(s => {
                    html += `<div class="nav-btn" onclick="viewTabs('${s}')"><div class="title-wrapper"><i class="fa-solid fa-book main-icon"></i> <span>${s}</span></div><i class="fa-solid fa-chevron-left"></i></div>`;
                });
                document.getElementById('dynamic-view').innerHTML = html + '</div>';
                return;
            }

            let html = '<div class="list-group">';
            activeSubjects.forEach(s => {
                html += `<div class="nav-btn" onclick="viewTabs('${s.title}')"><div class="title-wrapper"><i class="fa-solid fa-book main-icon"></i> <span>${s.title}</span></div><i class="fa-solid fa-chevron-left"></i></div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        // 6. هنا تفتح التبويبات الثلاثة المثالية لكل مادة بشكل مستقل ونظيف تماماً!
        function viewTabs(subject) {
            currentPath.subject = subject;
            updateUI(`المحتويات والمراجع لمادة (${subject}):`, true);
            
            const matchedData = subjectsData.find(item => 
                item.college === currentPath.college && 
                item.dept === currentPath.dept && 
                item.level === currentPath.level && 
                item.term === currentPath.term &&
                item.title === subject
            ) || { materials: [], references: [], courses: [] };

            let materialsHtml = generateFileCards(matchedData.materials, "لم يتم رفع ملازم أو سلايدات لهذه المادة حالياً.");
            let referencesHtml = generateFileCards(matchedData.references, "لم يتم إضافة مراجع أو كتب لهذه المادة بعد.");
            let coursesHtml = generateFileCards(matchedData.courses, "لا توجد روابط كورسات خارجية مضافة حالياً.");

            document.getElementById('dynamic-view').innerHTML = `
                <div class="tabs-header">
                    <div class="tab-link active" onclick="switchTab(event, 'materials-tab')"><i class="fa-regular fa-file-pdf"></i> ملازم / سلايدات</div>
                    <div class="tab-link" onclick="switchTab(event, 'books-tab')"><i class="fa-solid fa-book-open"></i> كتب / مراجع</div>
                    <div class="tab-link" onclick="switchTab(event, 'courses-tab')"><i class="fa-solid fa-play"></i> روابط كورسات</div>
                </div>
                <div id="materials-tab" class="tab-content active">${materialsHtml}</div>
                <div id="books-tab" class="tab-content">${referencesHtml}</div>
                <div id="courses-tab" class="tab-content">${coursesHtml}</div>
            `;
        }

        function generateFileCards(list, emptyMsg) {
            if(!list || list.length === 0) return `<div class="no-data">${emptyMsg}</div>`;
            let html = '';
            list.forEach(item => {
                if(item.name && item.url) {
                    html += `
                        <div class="file-card">
                            <div class="file-info">
                                <span class="file-name">${item.name}</span>
                                <span class="file-desc">${item.desc || 'لا يوجد وصف متاح للملف'}</span>
                            </div>
                            <a href="${item.url}" target="_blank" class="download-btn"><i class="fa-solid fa-download"></i> تحميل / عرض</a>
                        </div>`;
                }
            });
            return html || `<div class="no-data">${emptyMsg}</div>`;
        }

        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function updateUI(titleText, showBack) {
            document.getElementById('step-title').innerText = titleText;
            document.getElementById('back-btn').style.display = showBack ? 'flex' : 'none';
            
            let html = '<span onclick="goHome()"><i class="fa-solid fa-house"></i> الرئيسية</span>';
            if(currentPath.college) html += ` ⬅️ <span onclick="renderCurrentWith({dept:null, level:null, term:null, subject:null})">${currentPath.college}</span>`;
            if(currentPath.dept) html += ` ⬅️ <span onclick="renderCurrentWith({level:null, term:null, subject:null})">${currentPath.dept}</span>`;
            if(currentPath.level) html += ` ⬅️ <span onclick="renderCurrentWith({term:null, subject:null})">${currentPath.level}</span>`;
            if(currentPath.term) html += ` ⬅️ <span onclick="renderCurrentWith({subject:null})">${currentPath.term}</span>`;
            if(currentPath.subject) html += ` ⬅️ <span style="color:#64748b">${currentPath.subject}</span>`;
            document.getElementById('breadcrumb').innerHTML = html;
        }

        function renderCurrentWith(overrides) {
            Object.assign(currentPath, overrides);
            if (!currentPath.college) renderColleges();
            else if (!currentPath.dept) renderDepts();
            else if (!currentPath.level) renderLevels();
            else if (!currentPath.term) renderTerms();
            else if (!currentPath.subject) renderSubjects();
        }

        window.onload = loadData;
    </script>
</body>
</html>
