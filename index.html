<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة مساعد الدراسات الجامعية - م/ شاكر سعدان</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f1f5f9 !important; 
            margin: 0; 
            padding: 0; 
            color: #1e293b; 
            line-height: 1.6; 
        }
        header { 
            background: #1e3a8a !important; 
            color: white !important; 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 4px solid #3b82f6; 
        }
        header h1 { margin: 0; font-size: 22px; font-weight: bold; color: #ffffff !important; }
        .developer-tag { 
            display: inline-block; 
            margin-top: 10px; 
            background: #1e40af; 
            border: 1px solid #60a5fa; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            color: #93c5fd !important; 
        }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .navigation-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #ffffff !important; 
            padding: 12px 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            border: 1px solid #e2e8f0; 
        }
        .breadcrumb { display: flex; gap: 6px; font-size: 13px; color: #64748b; }
        .breadcrumb span { cursor: pointer; color: #1e3a8a; font-weight: bold; }
        .back-btn { 
            background: #f8fafc; 
            color: #334155; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #cbd5e1; 
        }

        .step-title { 
            font-size: 15px; 
            font-weight: bold; 
            color: #1e3a8a; 
            margin-bottom: 15px; 
            background: #eff6ff !important; 
            padding: 12px 15px; 
            border-radius: 10px; 
            border-right: 5px solid #2563eb; 
        }
        
        .list-group { display: flex; flex-direction: column; gap: 12px; }
        .nav-btn { 
            background: #ffffff !important; 
            padding: 16px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            font-size: 15px; 
            border: 1px solid #e2e8f0; 
            border-right: 5px solid #1e3a8a; 
        }
        .nav-btn:hover { background: #f8fafc !important; border-right-color: #3b82f6; }
        .nav-btn .title-wrapper { display: flex; align-items: center; gap: 10px; }

        .tabs-header { display: flex; background: #e2e8f0; border-radius: 8px; margin-bottom: 15px; padding: 3px; gap: 3px; }
        .tab-link { flex: 1; text-align: center; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; color: #475569; font-size: 14px; }
        .tab-link.active { background: #1e3a8a !important; color: white !important; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .tab-content.active { display: block; }
        
        .file-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 18px; 
            border-radius: 8px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            margin-bottom: 10px; 
        }
        .file-card .file-info { display: flex; flex-direction: column; gap: 2px; }
        .file-card .file-name { font-weight: bold; font-size: 14px; color: #0f172a; }
        .file-card .file-desc { font-size: 12px; color: #64748b; }
        .download-btn { 
            background: #10b981 !important; 
            color: white !important; 
            padding: 6px 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 12px; 
            text-decoration: none; 
        }

        .no-data { text-align: center; color: #64748b; padding: 30px 15px; font-size: 13px; background: #f8fafc; border-radius: 8px; border: 2px dashed #cbd5e1; }
    </style>
</head>
<body>

    <header>
        <h1>بوابة مساعد الدراسات الجامعية</h1>
        <div class="developer-tag">💻 رئيس المشروع والمطور: م/ شاكر سعدان</div>
        
    </header>

    <div class="container">
        <div class="navigation-bar">
            <div class="breadcrumb" id="breadcrumb">
                <span onclick="goHome()">🏠 الرئيسية</span>
            </div>
            <button class="back-btn" id="back-btn" onclick="goBack()" style="display: none;">⬅️ عودة</button>
        </div>

        <div class="step-title" id="step-title">جاري تحميل البيانات...</div>
        <div id="dynamic-view" style="text-align: center; padding: 30px; color: #64748b;">⏳ جاري الاتصال بالسيرفر النظيف...</div>
    </div>

    <script>
        let subjectsData = [];
        let currentPath = { college: null, dept: null, level: null, term: null, subject: null };

        let academicStructure = {
            "كلية الهندسة": ["هندسة حواسب", "هندسة مدنية", "هندسة معمارية", "هندسة اتصالات"],
            "كلية الحاسبات": ["تقنية معلومات", "علوم حاسوب", "نظم معلومات"],
            "كلية الطب": ["طب بشري", "مختبرات", "صيدلة"],
            "كلية التجارة": ["محاسبة", "إدارة أعمال"]
        };

        const levels = ["مستوى أول", "مستوى ثاني", "مستوى ثالث", "مستوى رابع", "مستوى خامس"];
        const terms = ["الفصل الأول", "الفصل الثاني"];

        async function loadData() {
            const timeout = setTimeout(() => {
                renderColleges();
            }, 2500);

            try {
                const structResponse = await fetch('https://api.github.com/repos/student-assist/University-Portal/contents/data/structure');
                if (structResponse.ok) {
                    const structFiles = await structResponse.json();
                    let tempStructure = {};
                    for (let file of structFiles) {
                        if (file.name.endsWith('.md')) {
                            const contentRes = await fetch(file.download_url);
                            if (contentRes.ok) {
                                const rawText = await contentRes.text();
                                const parsedStruct = parseMarkdownFrontmatter(rawText);
                                if (parsedStruct && parsedStruct.college) {
                                    let deptNames = [];
                                    if (Array.isArray(parsedStruct.depts)) {
                                        deptNames = parsedStruct.depts.map(d => d.dept_name).filter(Boolean);
                                    }
                                    tempStructure[parsedStruct.college] = deptNames;
                                }
                            }
                        }
                    }
                    if (Object.keys(tempStructure).length > 0) academicStructure = tempStructure;
                }
            } catch (e) { console.error(e); }

            try {
                const response = await fetch('https://api.github.com/repos/student-assist/University-Portal/contents/data/subjects');
                if (response.ok) {
                    const files = await response.json();
                    for (let file of files) {
                        if (file.name.endsWith('.md')) {
                            const contentRes = await fetch(file.download_url);
                            if (contentRes.ok) {
                                const rawText = await contentRes.text();
                                const parsed = parseMarkdownFrontmatter(rawText);
                                if(parsed) subjectsData.push(parsed);
                            }
                        }
                    }
                }
            } catch (error) { console.error(error); }

            clearTimeout(timeout);
            renderColleges();
        }

        function parseMarkdownFrontmatter(text) {
            if (!text || !text.startsWith('---')) return null;
            try {
                const parts = text.split(/---/);
                if (parts.length < 3) return null;
                const yamlText = parts[1];
                const lines = yamlText.split('\n');
                
                const obj = { materials: [], references: [], courses: [], depts: [] };
                let currentSection = null;
                let currentItem = null;

                for (let line of lines) {
                    let cleanLine = line.trim();
                    if (!cleanLine) continue;

                    if (cleanLine.endsWith(':')) {
                        let secName = cleanLine.slice(0, -1).trim();
                        if (['materials', 'references', 'courses', 'depts'].includes(secName)) {
                            currentSection = secName;
                            continue;
                        }
                    }

                    if (cleanLine.startsWith('-')) {
                        if (currentItem && currentSection) obj[currentSection].push(currentItem);
                        currentItem = {};
                        cleanLine = cleanLine.substring(1).trim();
                    }

                    const colonIndex = cleanLine.indexOf(':');
                    if (colonIndex !== -1) {
                        const key = cleanLine.substring(0, colonIndex).trim();
                        const val = cleanLine.substring(colonIndex + 1).trim().replace(/^"|"$/g, '');
                        if (currentSection && currentItem) {
                            currentItem[key] = val;
                        } else if (!currentSection) {
                            obj[key] = val;
                        }
                    }
                }
                if (currentItem && currentSection) obj[currentSection].push(currentItem);
                return obj;
            } catch(e) { return null; }
        }

        function goHome() {
            currentPath = { college: null, dept: null, level: null, term: null, subject: null };
            renderColleges();
        }

        function goBack() {
            if (currentPath.subject) { currentPath.subject = null; renderSubjects(); }
            else if (currentPath.term) { currentPath.term = null; renderTerms(); }
            else if (currentPath.level) { currentPath.level = null; renderLevels(); }
            else if (currentPath.dept) { currentPath.dept = null; renderDepts(); }
            else if (currentPath.college) { currentPath.college = null; renderColleges(); }
        }

        function renderColleges() {
            updateUI("الرجاء اختيار الكلية التابع لها للوصول للمواد:", false);
            let html = '<div class="list-group">';
            Object.keys(academicStructure).forEach(c => {
                html += `<div class="nav-btn" onclick="selectCollege('${c}')"><div class="title-wrapper">🏛️ <span>${c}</span></div> ◀️</div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectCollege(college) { currentPath.college = college; renderDepts(); }

        function renderDepts() {
            updateUI(`الأقسام والتخصصات المتاحة في (${currentPath.college}):`, true);
            let depts = academicStructure[currentPath.college] || [];
            let html = '<div class="list-group">';
            depts.forEach(d => {
                html += `<div class="nav-btn" onclick="selectDept('${d}')"><div class="title-wrapper">🎓 <span>${d}</span></div> ◀️</div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectDept(dept) { currentPath.dept = dept; renderLevels(); }

        function renderLevels() {
            updateUI(`المستويات الدراسية لتخصص (${currentPath.dept}):`, true);
            let html = '<div class="list-group">';
            levels.forEach(l => {
                html += `<div class="nav-btn" onclick="selectLevel('${l}')"><div class="title-wrapper">📊 <span>${l}</span></div> ◀️</div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectLevel(level) { currentPath.level = level; renderTerms(); }

        function renderTerms() {
            updateUI(`اختر الفصل الدراسي للوصول للمواد:`, true);
            let html = '<div class="list-group">';
            terms.forEach(t => {
                html += `<div class="nav-btn" onclick="selectTerm('${t}')"><div class="title-wrapper">📅 <span>${t}</span></div> ◀️</div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function selectTerm(term) { currentPath.term = term; renderSubjects(); }

        function renderSubjects() {
            updateUI(`المواد الدراسية المقررة:`, true);
            let activeSubjects = subjectsData.filter(item => 
                item.college === currentPath.college && 
                item.dept === currentPath.dept && 
                item.level === currentPath.level && 
                item.term === currentPath.term
            );

            if(activeSubjects.length === 0) {
                let defaultSubjects = ["برمجة حاسوب", "تراكيب بيانات", "رياضيات حاسوب"];
                let html = '<div class="list-group">';
                defaultSubjects.forEach(s => {
                    html += `<div class="nav-btn" onclick="viewTabs('${s}')"><div class="title-wrapper">📘 <span>${s}</span></div> ◀️</div>`;
                });
                document.getElementById('dynamic-view').innerHTML = html + '</div>';
                return;
            }

            let html = '<div class="list-group">';
            activeSubjects.forEach(s => {
                html += `<div class="nav-btn" onclick="viewTabs('${s.title}')"><div class="title-wrapper">📘 <span>${s.title}</span></div> ◀️</div>`;
            });
            document.getElementById('dynamic-view').innerHTML = html + '</div>';
        }

        function viewTabs(subject) {
            currentPath.subject = subject;
            updateUI(`المحتويات والمراجع لمادة (${subject}):`, true);
            
            const matchedData = subjectsData.find(item => 
                item.college === currentPath.college && 
                item.dept === currentPath.dept && 
                item.level === currentPath.level && 
                item.term === currentPath.term &&
                item.title === subject
            ) || { materials: [], references: [], courses: [] };

            let materialsHtml = generateFileCards(matchedData.materials, "لم يتم رفع ملازم أو سلايدات لهذه المادة حالياً.");
            let referencesHtml = generateFileCards(matchedData.references, "لم يتم إضافة مراجع أو كتب لهذه المادة بعد.");
            let coursesHtml = generateFileCards(matchedData.courses, "لا توجد روابط كورسات خارجية مضافة حالياً.");

            document.getElementById('dynamic-view').innerHTML = `
                <div class="tabs-header">
                    <div class="tab-link active" onclick="switchTab(event, 'materials-tab')">📄 ملازم / سلايدات</div>
                    <div class="tab-link" onclick="switchTab(event, 'books-tab')">📖 كتب / مراجع</div>
                    <div class="tab-link" onclick="switchTab(event, 'courses-tab')">🎬 روابط كورسات</div>
                </div>
                <div id="materials-tab" class="tab-content active">${materialsHtml}</div>
                <div id="books-tab" class="tab-content">${referencesHtml}</div>
                <div id="courses-tab" class="tab-content">${coursesHtml}</div>
            `;
        }

        function generateFileCards(list, emptyMsg) {
            if(!list || list.length === 0) return `<div class="no-data">${emptyMsg}</div>`;
            let html = '';
            list.forEach(item => {
                if(item.name && item.url) {
                    html += `
                        <div class="file-card">
                            <div class="file-info">
                                <span class="file-name">${item.name}</span>
                                <span class="file-desc">${item.desc || 'لا يوجد وصف متاح للملف'}</span>
                            </div>
                            <a href="${item.url}" target="_blank" class="download-btn">⬇️ تحميل</a>
                        </div>`;
                }
            });
            return html || `<div class="no-data">${emptyMsg}</div>`;
        }

        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function updateUI(titleText, showBack) {
            document.getElementById('step-title').innerText = titleText;
            document.getElementById('back-btn').style.display = showBack ? 'block' : 'none';
            
            let html = '<span onclick="goHome()">🏠 الرئيسية</span>';
            if(currentPath.college) html += ` ⬅️ <span onclick="renderCurrentWith({dept:null, level:null, term:null, subject:null})">${currentPath.college}</span>`;
            if(currentPath.dept) html += ` ⬅️ <span onclick="renderCurrentWith({level:null, term:null, subject:null})">${currentPath.dept}</span>`;
            if(currentPath.level) html += ` ⬅️ <span onclick="renderCurrentWith({term:null, subject:null})">${currentPath.level}</span>`;
            if(currentPath.term) html += ` ⬅️ <span onclick="renderCurrentWith({subject:null})">${currentPath.term}</span>`;
            if(currentPath.subject) html += ` ⬅️ <span style="color:#64748b">${currentPath.subject}</span>`;
            document.getElementById('breadcrumb').innerHTML = html;
        }

        function renderCurrentWith(overrides) {
            Object.assign(currentPath, overrides);
            if (!currentPath.college) renderColleges();
            else if (!currentPath.dept) renderDepts();
            else if (!currentPath.level) renderLevels();
            else if (!currentPath.term) renderTerms();
            else if (!currentPath.subject) renderSubjects();
        }

        window.onload = loadData;
    </script>
</body>
</html>
